name: Build and deploy Node.js app to Azure Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build (if present)
        run: npm run build --if-present

      - name: Test (if present)
        run: npm run test --if-present

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy-primary:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to PRIMARY Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: proj4-primarywebapp
          publish-profile: ${{ secrets.AZURE_PRIMARY_PUBLISH_PROFILE }}
          package: .

  deploy-secondary:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to SECONDARY Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: proj4-secondarywebapp
          publish-profile: ${{ secrets.AZURE_SECONDARY_PUBLISH_PROFILE }}
          package: .
